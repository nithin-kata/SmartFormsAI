{% extends "base.html" %}

{% block title %}Edit Employee — SmartForms AI{% endblock %}
{% block page_title %}Edit Employee{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-title">Edit Employee</h2>
    <form action="{{ url_for('hr_orgchart.edit_employee', id=employee.id) }}" method="POST" class="form-group">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-input" required value="{{ employee.name }}">
        
        <label class="form-label" style="margin-top: 1rem;">Position</label>
        <input type="text" name="position" class="form-input" required value="{{ employee.position }}">
        
        <label class="form-label" style="margin-top: 1rem;">Department</label>
        <input type="text" name="department" class="form-input" value="{{ employee.department }}">
        
        <label class="form-label" style="margin-top: 1rem;">Manager</label>
        <select name="manager_id" class="form-input">
            <option value="">None (Top Level)</option>
            {% for emp in employees %}
            <option value="{{ emp.id }}" {% if employee.manager_id == emp.id %}selected{% endif %}>{{ emp.name }}</option>
            {% endfor %}
        </select>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('hr_orgchart.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
